<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main>
      <section>
        <div class="container">
          <h1>My Day To-Do List</h1>
        <ul class="todo-list">
          <li>
            <input type="checkbox" name="todo" id="todo1" />
            <label for="todo1">Morning Workout</label>
            <ul class="sub-item">
              <li>
                <p>Workout Time <time datetime="07:00">7:00 AM</time>.</p>
                <a href="#sub-item1" class="sub-item-link" target="_blank"
                  >View Workout routine</a
                >
              </li>
            </ul>
          </li>
          <li>
            <input type="checkbox" name="todo" id="todo2" />
            <label for="todo2">Office Work</label>
            <ul class="sub-item">
              <li>
                <p>Login at <time datetime="09:00">9:00 AM</time>.</p>
                <a href="#sub-item2" class="sub-item-link" target="_blank"
                  >Check emails & work</a
                >
              </li>
            </ul>
          </li>
          <li>
            <input type="checkbox" name="todo" id="todo3" />
            <label for="todo3">Swimming</label>
            <ul class="sub-item">
              <li>
                <p>Swimming Time <time datetime="19:00">7:00 PM</time>.</p>
                <a href="#sub-item3" class="sub-item-link" target="_blank"
                  >View Swimming Plan</a
                >
              </li>
            </ul>
          </li>
          <li>
            <input type="checkbox" name="todo" id="todo4" />
            <label for="todo4">Japanese Study</label>
            <ul class="sub-item">
              <li>
                <p>Study Time <time datetime="21:00">9:00 PM</time>.</p>
                <a href="#sub-item4" class="sub-item-link" target="_blank"
                  >View Japanese Study Materials</a
                >
              </li>
            </ul>
          </li>
        </ul>
      </section>
        </div>
      </section>
    </main>
  </body>
</html>
