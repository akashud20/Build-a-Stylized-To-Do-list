<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Styled To-Do List</title>
  </head>

  <body>
    <ul class="todo-list">
      <li>
        <input type="checkbox" name="todo" id="todo1" />
        <label for="todo1">Task 1</label>
        <ul class="sub-item">
          <li><a href="#sub-item1" class="sub-item-link" target="_blank">subtask 1</a></li>
        </ul>
      </li>
      <li>
        <input type="checkbox" name="todo" id="todo2" />
        <label for="todo2">Task 2</label>
        <ul class="sub-item">
          <li><a href="#sub-item2" class="sub-item-link" target="_blank">subtask 2</a></li>
        </ul>
      </li>
      <li>
        <input type="checkbox" name="todo" id="todo3" />
        <label for="todo3">Task 3</label>
        <ul class="sub-item">
          <li><a href="#sub-item3" class="sub-item-link" target="_blank">subtask 3</a></li>
        </ul>
      </li>
      <li>
        <input type="checkbox" name="todo" id="todo4" />
        <label for="todo4">Task 4</label>
        <ul class="sub-item">
          <li><a href="#sub-item4" class="sub-item-link" target="_blank">subtask 4</a></li>
        </ul>
      </li>
    </ul>
  </body>
</html>
